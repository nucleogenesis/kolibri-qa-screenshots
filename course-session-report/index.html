<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Session Report Screenshots</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
  h1 { margin-bottom: 1.5rem; }
  .phase { margin-bottom: 3rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; overflow: hidden; }
  .phase-header { background: #2a2a5a; color: #fff; padding: 1rem 1.5rem; }
  .phase-header h2 { font-size: 1.2rem; }
  .phase-header code { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 3px; font-size: 0.9rem; }
  .phase-header .session-id { font-size: 0.75rem; opacity: 0.7; margin-top: 0.25rem; }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid #eee; position: relative; }
  .tabs button { flex: 1; padding: 1rem; border: none; background: #e0e0ea; cursor: pointer; font-size: 1.1rem; font-weight: 600; color: #2a2a5a; transition: all 0.15s; position: relative; }
  .tabs button:hover { background: #c8c8d8; color: #2a2a5a; }
  .tabs button.active { background: #4a4a8a; color: #fff; border-bottom: 4px solid #4a4a8a; margin-bottom: -2px; }
  .tabs button.active::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 12px solid #4a4a8a; z-index: 1; }
  .screenshot { padding: 1rem; text-align: center; }
  .screenshot img { max-width: 100%; border: 1px solid #eee; border-radius: 4px; }
  .screenshot .missing { color: #999; font-style: italic; padding: 3rem; }
</style>
</head>
<body>
<h1>Course Session Report - All Phases</h1>

<script>
const phases = [
  { phase: 'pre_test_pending', title: 'HB - Pre-test Pending', id: 'c2073bd3aef19708d7085d5e8375f2f7' },
  { phase: 'pre_test_active', title: 'HB - Pre-test Active', id: 'e8165464c2b3fa51e22a7dec23a9049f' },
  { phase: 'post_test_pending', title: 'HB - Post-test Pending', id: '51d84767dbf6ee6eaae395656c6b3e95' },
  { phase: 'post_test_active', title: 'HB - Post-test Active', id: '9004fd6fab841d0264042976c0a3f7f6' },
  { phase: 'complete', title: 'IC - Complete', id: '18029f67536389b848004944d2107009' },
  { phase: 'pre_test_active_u2', title: 'IC - Unit 2 Pre-test Active', id: 'e947732a62de6c7430c0bb5b704d4bf7' },
  { phase: 'post_test_active_u3', title: 'IC - Unit 3 Post-test Active', id: '1aaf9c20e29e007b0529160b4a0a4803' },
];

const tabs = [
  { name: 'Units', slug: 'units' },
  { name: 'Learners', slug: 'learners' },
  { name: 'Learning objectives', slug: 'learning-objectives' },
];

for (const p of phases) {
  const section = document.createElement('div');
  section.className = 'phase';

  section.innerHTML = `
    <div class="phase-header">
      <h2>${p.title} &mdash; <code>${p.phase}</code></h2>
      <div class="session-id">Session ID: ${p.id}</div>
    </div>
    <div class="tabs">
      ${tabs.map((t, i) => `<button class="${i === 0 ? 'active' : ''}" data-phase="${p.phase}" data-tab="${t.slug}">${t.name}</button>`).join('')}
    </div>
    <div class="screenshot" id="img-${p.phase}">
      <img src="${p.phase}--units.png" onerror="this.outerHTML='<div class=\\'missing\\'>Screenshot not found</div>'" />
    </div>
  `;

  document.body.appendChild(section);
}

document.addEventListener('click', (e) => {
  if (e.target.matches('.tabs button')) {
    const phase = e.target.dataset.phase;
    const tab = e.target.dataset.tab;
    // Update active button
    e.target.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    // Swap image
    const container = document.getElementById('img-' + phase);
    container.innerHTML = `<img src="${phase}--${tab}.png" onerror="this.outerHTML='<div class=\\'missing\\'>Screenshot not found</div>'" />`;
  }
});
</script>
</body>
</html>
